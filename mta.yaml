_schema-version: "3.2"
ID: com.sap.pm.pmanalyzer
version: 1.0.0

modules:
  # --------------------- APPFRAMEWORK MODULE ---------------------
  - name: pm-analyzer-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      disk-quota: 256M
      memory: 256M
    requires:
      - name: pm-analyzer-destination
      - name: pm-analyzer-html5-repo-runtime
      - name: pm-analyzer-xsuaa

  # --------------------- UI MODULE ---------------------------
  - name: pm-analyzer-fiori
    type: html5
    path: pm-analyzer-fiori
    parameters:
      disk-quota: 256M
      memory: 512M
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build:cf
    requires:
      - name: pm-analyzer-xsuaa
      - name: pm-analyzer-html5-repo-host

resources:
  # --------------------- SERVICES -----------------------------------
  - name: pm-analyzer-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        init_data:
          instance:
            destinations:
              - Name: pm-analyzer-backend
                Type: HTTP
                URL: https://pm-analyzer-backend-dev.cfapps.us10-001.hana.ondemand.com
                ProxyType: Internet
                Authentication: NoAuthentication
            existing_destinations_policy: update

  - name: pm-analyzer-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: pm-analyzer-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
    requires:
      - name: pm-analyzer-xsuaa

  - name: pm-analyzer-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: pm-analyzer-${space}
        tenant-mode: dedicated
